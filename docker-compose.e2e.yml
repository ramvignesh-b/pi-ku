services:
  db:
    image: postgres:16-alpine
    container_name: ${DB_NAME}
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    restart: never

  mailpit:
      image: axllent/mailpit
      container_name: piku_test_mail
      ports:
        - "${EMAIL_API_PORT}:8025"
        - "${EMAIL_PORT}:1025"
      restart: never
